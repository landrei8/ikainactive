<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ikariam Inactivi - Radar de Fermă</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #333333;
            --border: #e0e0e0;
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            background: var(--primary); color: white; padding: 20px 30px;
            border-radius: 8px 8px 0 0; display: flex;
            justify-content: space-between; align-items: center;
        }

        .header h1 { margin: 0; font-size: 1.5rem; }

        .dashboard {
            background: var(--card-bg); padding: 20px 30px;
            border: 1px solid var(--border); border-top: none;
            border-radius: 0 0 8px 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .controls {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
        }

        .control-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; color: var(--primary); }
        input[type="text"], input[type="number"], input[type="file"] {
            padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem;
        }
        input[type="range"] { width: 100%; margin-top: 10px; }
        .coord-inputs { display: flex; gap: 10px; align-items: center; }
        .coord-inputs input { width: 80px; text-align: center; }

        .btn {
            background-color: var(--accent); color: white; border: none;
            padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .btn:hover { background-color: #2980b9; }

        .status { padding: 10px; border-radius: 5px; margin-bottom: 20px; font-size: 0.9rem; display: none; }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        .status.info { background: #e2e3e5; color: #383d41; display: block; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background-color: #f1f3f5; color: var(--primary); font-weight: 600; }
        tbody tr:hover { background-color: #f8f9fa; }
        .empty-state { text-align: center; padding: 40px; color: #777; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Ikariam - Radar de Inactivi</h1>
        <button class="btn" onclick="fetchDataFromServer()">Încarcă "inactive.html" de pe Server</button>
    </div>
    
    <div class="dashboard">
        <div id="statusBox" class="status info">Gata! Apasă butonul de sus sau alege fișierul local.</div>
        
        <div class="controls">
            <div class="control-group">
                <label>Fișier Local (Dacă nu merge butonul de sus):</label>
                <input type="file" accept=".html" onchange="handleFileUpload(event)">
            </div>
            <div class="control-group">
                <label>Coordonatele tale (X:Y):</label>
                <div class="coord-inputs">
                    <input type="number" id="baseX" value="57" min="1" max="100" onchange="applyFilters()">
                    <span> : </span>
                    <input type="number" id="baseY" value="70" min="1" max="100" onchange="applyFilters()">
                </div>
            </div>
            <div class="control-group">
                <label>Distanță maximă: <span id="distValue" style="color:#3498db;font-weight:bold;">20</span> insule</label>
                <input type="range" id="distSlider" min="0" max="150" value="20" oninput="document.getElementById('distValue').innerText=this.value" onchange="applyFilters()">
            </div>
            <div class="control-group">
                <label>Caută Jucător / Oraș:</label>
                <input type="text" id="searchInput" placeholder="Tastează un nume..." onkeyup="applyFilters()">
            </div>
        </div>

        <div style="overflow-x: auto;">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Jucător</th>
                        <th>Oraș</th>
                        <th>Coordonate</th>
                        <th>Nivel Pădure</th>
                        <th>Nivel Lux</th>
                        <th>Distanță ↕️</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" class="empty-state">Nu există date încărcate.</td></tr>
                </tbody>
            </table>
        </div>
        <p style="text-align: right; color: #777; font-size: 0.85rem; margin-top: 15px;">Orașe găsite: <span id="countDisplay" style="font-weight:bold;">0</span></p>
    </div>
</div>

<script>
    let playersData = []; 

    function fetchDataFromServer() {
        showStatus('info', 'Se descarcă datele...');
        fetch('inactive.html')
            .then(response => {
                if (!response.ok) throw new Error('Nu am găsit inactive.html');
                return response.text();
            })
            .then(html => {
                parseHTMLData(html);
                showStatus('success', 'Date extrase cu succes!');
            })
            .catch(error => {
                showStatus('error', error.message);
            });
    }

    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            parseHTMLData(e.target.result);
            showStatus('success', 'Date extrase din fișier local!');
        };
        reader.readAsText(file);
    }

    function parseHTMLData(htmlText) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, 'text/html');
        playersData = [];
        
        // Citim pagina de sus în jos (Element cu Element) pentru a asocia corect Numele cu Tabelul
        const elements = doc.querySelectorAll('.ika-member-name, table');
        let currentPlayer = "Necunoscut";

        elements.forEach(el => {
            if (el.classList.contains('ika-member-name')) {
                // Actualizăm numele jucătorului (eliminăm punctul alb/roșu)
                currentPlayer = el.textContent.replace('⚪', '').replace('🔴', '').trim();
            } else if (el.tagName.toLowerCase() === 'table') {
                
                // Căutăm exact unde sunt coloanele ca să nu mai extragă "1" din greșeală
                let woodIdx = 1; // Presupunere de bază
                let coordsIdx = 2; // Presupunere de bază
                let foundLevel = false;

                const ths = el.querySelectorAll('th');
                ths.forEach((th, index) => {
                    const text = th.textContent.toLowerCase();
                    if (text.includes('level') && !foundLevel) {
                        woodIdx = index; // Găsim EXACT coloana cu "Level"
                        foundLevel = true;
                    }
                    if (text.includes('coords')) {
                        coordsIdx = index; // Găsim EXACT coloana cu "Coords"
                    }
                });

                // Acum extragem datele de pe fiecare rând, pe baza coloanelor detectate
                const rows = el.querySelectorAll('tr');
                rows.forEach(row => {
                    const cells = row.querySelectorAll('td');
                    if (cells.length > coordsIdx) {
                        const city = cells[0].textContent.trim();
                        const wood = cells[woodIdx] ? cells[woodIdx].textContent.trim() : "-";
                        const coords = cells[coordsIdx] ? cells[coordsIdx].textContent.trim() : "";
                        
                        if (coords.includes(':')) {
                            let luxLevel = "0";
                            // Luxul e în general sub forma de poză + număr în paranteză (ex: (29))
                            for (let i = 3; i < cells.length; i++) {
                                const match = cells[i].textContent.match(/\((\d+)\)/);
                                if (match) {
                                    luxLevel = match[1];
                                    break;
                                }
                            }
                            
                            playersData.push({
                                player: currentPlayer,
                                city: city,
                                coords: coords,
                                wood: wood,
                                lux: luxLevel
                            });
                        }
                    }
                });
            }
        });
        
        applyFilters();
    }

    function calculateDistance(coords, startX, startY) {
        try {
            const [x, y] = coords.split(':').map(Number);
            return Math.sqrt(Math.pow(x - startX, 2) + Math.pow(y - startY, 2));
        } catch (e) { return 9999; }
    }

    function applyFilters() {
        const startX = parseInt(document.getElementById('baseX').value) || 57;
        const startY = parseInt(document.getElementById('baseY').value) || 70;
        const maxDist = parseFloat(document.getElementById('distSlider').value);
        const searchQuery = document.getElementById('searchInput').value.toLowerCase();
        const tbody = document.getElementById('tableBody');
        
        if (playersData.length === 0) return;

        let filteredData = playersData.map(item => {
            return { ...item, dist: calculateDistance(item.coords, startX, startY) };
        }).filter(item => {
            const matchSearch = item.player.toLowerCase().includes(searchQuery) || item.city.toLowerCase().includes(searchQuery);
            const matchDist = item.dist <= maxDist;
            return matchSearch && matchDist;
        });

        filteredData.sort((a, b) => a.dist - b.dist);

        let html = '';
        filteredData.forEach(item => {
            const distColor = item.dist === 0 ? "color: green; font-weight: bold;" : "";
            html += `
                <tr>
                    <td style="font-weight:600; color:#2c3e50;">${item.player}</td>
                    <td>${item.city}</td>
                    <td>${item.coords}</td>
                    <td><b style="color:#27ae60;">${item.wood}</b></td>
                    <td><b style="color:#8e44ad;">${item.lux}</b></td>
                    <td style="${distColor}">${item.dist.toFixed(2)}</td>
                </tr>
            `;
        });

        tbody.innerHTML = html || '<tr><td colspan="6" class="empty-state">Niciun oraș nu corespunde filtrelor.</td></tr>';
        document.getElementById('countDisplay').innerText = filteredData.length;
    }

    function showStatus(type, message) {
        const box = document.getElementById('statusBox');
        box.className = 'status ' + type;
        box.innerHTML = message;
    }
</script>

</body>
</html>
