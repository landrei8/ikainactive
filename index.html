

<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ikariam Inactivi - Radar de Fermă</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #333333;
            --border: #e0e0e0;
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 20px 30px;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { margin: 0; font-size: 1.5rem; }

        .dashboard {
            background: var(--card-bg);
            padding: 20px 30px;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--primary);
        }

        input[type="text"], input[type="number"], input[type="file"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }
        
        input[type="range"] {
            width: 100%;
            margin-top: 10px;
        }

        .coord-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .coord-inputs input {
            width: 80px;
            text-align: center;
        }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn:hover { background-color: #2980b9; }

        .status {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        .status.info { background: #e2e3e5; color: #383d41; display: block; }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: #f1f3f5;
            color: var(--primary);
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        tbody tr:hover { background-color: #f8f9fa; }

        .slider-value {
            font-weight: bold;
            color: var(--accent);
            font-size: 1.1rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Ikariam - Radar de Inactivi</h1>
        <button id="autoLoadBtn" class="btn" onclick="fetchDataFromServer()">Încarcă "inactive.html" de pe Server</button>
    </div>
    
    <div class="dashboard">
        <div id="statusBox" class="status info">Sistemul este gata. Te rog să încarci fișierul <b>inactive.html</b> pentru a extrage jucătorii.</div>
        
        <div class="controls">
            <!-- File Input for Local Use -->
            <div class="control-group">
                <label>Dacă rulezi local, selectează fișierul manual:</label>
                <input type="file" id="fileInput" accept=".html" onchange="handleFileUpload(event)">
            </div>
            
            <!-- Coords Setup -->
            <div class="control-group">
                <label>Coordonatele tale de plecare (X:Y):</label>
                <div class="coord-inputs">
                    <input type="number" id="baseX" value="57" min="1" max="100" onchange="applyFilters()">
                    <span> : </span>
                    <input type="number" id="baseY" value="70" min="1" max="100" onchange="applyFilters()">
                </div>
            </div>

            <!-- Distance Slider -->
            <div class="control-group">
                <label>Distanță maximă (Insule): <span id="distValue" class="slider-value">20</span></label>
                <input type="range" id="distSlider" min="0" max="150" value="20" oninput="updateSliderText(this.value)" onchange="applyFilters()">
            </div>

            <!-- Search -->
            <div class="control-group">
                <label>Caută Jucător / Oraș:</label>
                <input type="text" id="searchInput" placeholder="Tastează un nume..." onkeyup="applyFilters()">
            </div>
        </div>

        <div class="table-responsive">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Jucător</th>
                        <th>Oraș</th>
                        <th>Coordonate</th>
                        <th>Nivel Pădure</th>
                        <th>Nivel Lux</th>
                        <th>Distanță ↕️</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" class="empty-state">Nu există date încărcate. Apasă pe butonul de sus sau selectează un fișier.</td></tr>
                </tbody>
            </table>
        </div>
        <p style="text-align: right; color: #777; font-size: 0.85rem; margin-top: 15px;">Afișează <span id="countDisplay">0</span> orașe găsite.</p>
    </div>
</div>

<script>
    let playersData = []; // Store parsed data globally

    // 1. Fetch from Server (GitHub Pages)
    function fetchDataFromServer() {
        showStatus('info', 'Se descarcă datele din inactive.html...');
        
        fetch('inactive.html')
            .then(response => {
                if (!response.ok) throw new Error('Nu am putut găsi fișierul inactive.html pe server.');
                return response.text();
            })
            .then(html => {
                parseHTMLData(html);
                showStatus('success', 'Datele au fost încărcate cu succes automat din repository!');
            })
            .catch(error => {
                console.error(error);
                showStatus('error', 'Eroare: ' + error.message + ' (Dacă ești pe PC, folosește butonul de Selectează fișier).');
            });
    }

    // 2. Manual Upload Fallback
    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        showStatus('info', 'Se procesează fișierul...');
        const reader = new FileReader();
        reader.onload = function(e) {
            parseHTMLData(e.target.result);
            showStatus('success', 'Datele au fost extrase manual cu succes!');
        };
        reader.readAsText(file);
    }

    // 3. Core Parsing Engine
    function parseHTMLData(htmlText) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, 'text/html');
        playersData = []; // reset
        
        // Căutăm toate elementele div care au un jucător sau tabelele cu clase specifice
        // Întrucât scriptul tău Ikariam adaugă <span class="ika-member-name"> și apoi <table>, le traversăm
        
        const tables = doc.querySelectorAll('table');
        
        tables.forEach(table => {
            // Încercăm să găsim numele jucătorului (căutăm în părinte sau elementele anterioare)
            let playerName = "Necunoscut";
            let parentDiv = table.closest('div');
            
            if (parentDiv) {
                let nameSpan = parentDiv.querySelector('.ika-member-name');
                if (nameSpan) {
                    playerName = nameSpan.textContent.replace('⚪', '').trim();
                } else {
                    // Caută la frații anteriori
                    let prev = table.previousElementSibling;
                    while(prev) {
                        let innerSpan = prev.querySelector('.ika-member-name');
                        if (innerSpan) {
                            playerName = innerSpan.textContent.replace('⚪', '').trim();
                            break;
                        }
                        if (prev.classList && prev.classList.contains('ika-member-name')) {
                            playerName = prev.textContent.replace('⚪', '').trim();
                            break;
                        }
                        prev = prev.previousElementSibling;
                    }
                }
            }
            
            // Extragere rânduri
            const rows = table.querySelectorAll('tbody tr, tr');
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 4) { // Minimul necesar pentru City, Wood, Coords
                    // Mapare inteligentă a coloanelor
                    const city = cells[0].textContent.trim();
                    const woodLevel = cells[1].textContent.trim();
                    const coordsText = cells[2].textContent.trim();
                    
                    if (coordsText.includes(':')) {
                        // Căutăm nivelul de lux în toate coloanele rămase
                        let luxLevel = "0";
                        for (let i = 3; i < cells.length; i++) {
                            const match = cells[i].textContent.match(/\((\d+)\)/);
                            if (match) {
                                luxLevel = match[1];
                                break;
                            }
                        }
                        
                        playersData.push({
                            player: playerName,
                            city: city,
                            coords: coordsText,
                            wood: woodLevel,
                            lux: luxLevel
                        });
                    }
                }
            });
        });
        
        applyFilters(); // Afișăm pe ecran
    }

    // 4. Distance Calculation
    function calculateDistance(coords, startX, startY) {
        try {
            const [x, y] = coords.split(':').map(Number);
            return Math.sqrt(Math.pow(x - startX, 2) + Math.pow(y - startY, 2));
        } catch (e) {
            return 9999;
        }
    }

    // 5. Apply Filters and Render Table
    function applyFilters() {
        const startX = parseInt(document.getElementById('baseX').value) || 57;
        const startY = parseInt(document.getElementById('baseY').value) || 70;
        const maxDist = parseFloat(document.getElementById('distSlider').value);
        const searchQuery = document.getElementById('searchInput').value.toLowerCase();
        const tbody = document.getElementById('tableBody');
        
        if (playersData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Nu există date încărcate.</td></tr>';
            document.getElementById('countDisplay').innerText = "0";
            return;
        }

        // Calculează distanța și filtrează simultan
        let filteredData = playersData.map(item => {
            return {
                ...item,
                dist: calculateDistance(item.coords, startX, startY)
            };
        }).filter(item => {
            const matchSearch = item.player.toLowerCase().includes(searchQuery) || item.city.toLowerCase().includes(searchQuery);
            const matchDist = item.dist <= maxDist;
            return matchSearch && matchDist;
        });

        // Sortează după distanță crescător
        filteredData.sort((a, b) => a.dist - b.dist);

        // Render HTML
        let html = '';
        filteredData.forEach(item => {
            // Highlight pentru coordonatele care sunt la distanță zero
            const distColor = item.dist === 0 ? "color: green; font-weight: bold;" : "";
            
            html += `
                <tr>
                    <td><strong>${item.player}</strong></td>
                    <td>${item.city}</td>
                    <td>${item.coords}</td>
                    <td>${item.wood}</td>
                    <td>${item.lux}</td>
                    <td style="${distColor}">${item.dist.toFixed(2)}</td>
                </tr>
            `;
        });

        tbody.innerHTML = html || '<tr><td colspan="6" class="empty-state">Niciun oraș nu corespunde filtrelor tale.</td></tr>';
        document.getElementById('countDisplay').innerText = filteredData.length;
    }

    // Helpers
    function updateSliderText(val) {
        document.getElementById('distValue').innerText = val;
    }
    
    function showStatus(type, message) {
        const box = document.getElementById('statusBox');
        box.className = 'status ' + type;
        box.innerHTML = message;
    }
</script>

</body>
</html>
